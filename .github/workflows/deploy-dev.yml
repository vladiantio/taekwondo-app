name: Build and Push Docker Image (Dev)

on:
  push:
    branches:
      - "dev"
      - "develop"
      - "development"
      - "**/dev"
      - "**/develop"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: Extract RC version from tabstash.dev/package.json
      #   id: version
      #   run: |
      #     VERSION=$(jq -r .version tabstash.dev/package.json)
      #     RC_VERSION="${VERSION}-rc"
      #     echo "version=$VERSION" >> $GITHUB_OUTPUT
      #     echo "rc_version=$RC_VERSION" >> $GITHUB_OUTPUT
      #     echo "version_tag=v${RC_VERSION}" >> $GITHUB_OUTPUT
      #     echo "Version: $VERSION"
      #     echo "RC Version: $RC_VERSION"

      # - name: Check if version tag exists
      #   id: version_check
      #   run: |
      #     VERSION_TAG="${{ steps.version.outputs.version_tag }}"
      #     if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
      #       echo "exists=true" >> $GITHUB_OUTPUT
      #       echo "Tag $VERSION_TAG already exists"
      #     else
      #       echo "exists=false" >> $GITHUB_OUTPUT
      #       echo "Tag $VERSION_TAG does not exist, will create release"
      #     fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (for tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev-latest
            type=raw,value=${{ steps.version.outputs.rc_version }}
            type=raw,value=${{ steps.version.outputs.version_tag }}
            type=raw,value=${{ github.ref_name }}-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.rc_version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Generate release notes
      #   if: steps.version_check.outputs.exists == 'false'
      #   id: release_notes
      #   run: |
      #     PREVIOUS_TAG=$(git tag --sort=-creatordate --list "v*-rc*" | sed -n '1p' || echo "")
      #     if [ -n "$PREVIOUS_TAG" ]; then
      #       NOTES=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- Initial RC release")
      #     else
      #       NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
      #     fi
      #     {
      #       echo 'notes<<EOF'
      #       echo "## Release Candidate ${{ steps.version.outputs.version_tag }}"
      #       echo ""
      #       echo "### What's Changed"
      #       echo "$NOTES"
      #       echo ""
      #       echo "### Docker Image"
      #       echo "\`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.rc_version }}\`"
      #       echo ""
      #       echo "**Note:** This is a release candidate build from the \`${{ github.ref_name }}\` branch."
      #       echo 'EOF'
      #     } >> $GITHUB_OUTPUT

      # - name: Create Git Tag
      #   if: steps.version_check.outputs.exists == 'false'
      #   run: |
      #     git config user.name "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git tag -a "${{ steps.version.outputs.version_tag }}" -m "Release Candidate ${{ steps.version.outputs.version_tag }}"
      #     git push origin "${{ steps.version.outputs.version_tag }}"

      - name: Create GitHub Release (Prerelease)
        if: steps.version_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: Release Candidate ${{ steps.version.outputs.version_tag }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger Dokploy deployment
        if: success()
        run: |
          curl -X POST "http://161.97.121.176:3000/api/deploy/q3vlO3pEAYO4BfuiPZH3_" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            --fail-with-body
